version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
    - whitespace
    - goconst

  settings:
    goconst:
      min-occurrences: 3
      ignore-tests: true

  exclusions:
    rules:
      # Domain identifier strings — not magic values
      - path: pkg/just/
        linters:
          - goconst
      - path: pkg/infocmd/
        linters:
          - goconst
      - path: pkg/project/
        linters:
          - goconst
      - path: internal/cmd/forensic/
        linters:
          - goconst
      - path: pkg/forgeconfig/
        linters:
          - goconst
      - path: internal/cmd/feature/
        linters:
          - goconst
      - path: internal/cmd/worktree/
        linters:
          - goconst
      - path: pkg/task/
        linters:
          - goconst
      - path: internal/cmd/
        linters:
          - goconst
      - path: pkg/git/
        linters:
          - goconst
      - path: pkg/prompt/
        linters:
          - goconst

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam
      - rangeValCopy

  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
      - name: unused-parameter
      - name: unreachable-code
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: unnecessary-stmt
      - name: early-return

  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - govet
        - revive
        - gocritic

  max-issues-per-linter: 50
  max-same-issues: 5

formatters:
  enable:
    - gofmt
    - goimports
