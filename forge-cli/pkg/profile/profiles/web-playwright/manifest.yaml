name: web-playwright
display: "Web UI/API/CLI (Playwright + TypeScript)"
language: typescript
file-extension: .spec.ts
test-directory: tests/e2e/

capabilities: [web-ui, api, cli]

templates:
  test-file-ui: templates/playwright-ui.spec.ts
  test-file-api: templates/api.spec.ts
  test-file-cli: templates/cli.spec.ts
  helpers: templates/helpers.ts
  config-file: templates/playwright.config.ts
  auth-setup: templates/auth-setup.ts
  package-file: templates/package.json
  tsconfig-file: templates/tsconfig.json
  additional: []
