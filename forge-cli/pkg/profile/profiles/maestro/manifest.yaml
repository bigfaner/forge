name: maestro
display: "React Native / Flutter (Maestro CLI)"
language: yaml
file-extension: .yaml
test-directory: tests/e2e/

capabilities: [mobile-ui, api]

templates:
  test-file: templates/test-file.yaml
  config-file: templates/config.yaml
  additional: []

run:
  command: "maestro test tests/e2e/ --format junit --output tests/e2e/results/"
  compile: null
  result-format: maestro-junit

graduate:
  target-directory: tests/e2e/
  merge-strategy: file
  import-rewrite: null
  compile-check: null
  list-tests: "maestro test tests/e2e/ --list"
